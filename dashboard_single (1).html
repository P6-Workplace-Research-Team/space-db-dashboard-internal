<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>공간DB — 설계 가이드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"/>
<style>/* Purple6 v2.0 design tokens — 공간DB */
:root {
  /* Brand */
  --p6-purple: #7800f5;
  --p6-purple-50: #f5ecff;
  --p6-purple-100: #ead6ff;
  --p6-purple-200: #d4adff;
  --p6-purple-300: #b77aff;
  --p6-purple-400: #9a47ff;
  --p6-purple-500: #7800f5;
  --p6-purple-600: #6000c4;
  --p6-purple-700: #480093;

  /* Program palette — 공간 프로그램별 상징 색 (Purple6 확장) */
  --prog-work:    #7800f5;  /* 업무 — 메인 퍼플 */
  --prog-exec:    #ff7a3d;  /* 임원 — 버밀리언 */
  --prog-meet:    #00b789;  /* 회의 — 그린 */
  --prog-social:  #ffb200;  /* 소셜 — 앰버 */
  --prog-support: #3a6ff5;  /* 지원 — 블루 */
  --prog-circ:    #c9c2d8;  /* 동선/기타 — 뉴트럴 */

  /* Neutral */
  --ink-900: #0e0a18;
  --ink-800: #1f1a2d;
  --ink-700: #3a3350;
  --ink-600: #5a5470;
  --ink-500: #8a8498;
  --ink-400: #b0aabe;
  --ink-300: #d4cfdd;
  --ink-200: #e8e8e8;
  --ink-100: #f3f0f8;
  --ink-50:  #faf9fc;
  --bg:      #ffffff;
  --bg-soft: #faf8fd;

  /* Radii */
  --r-card: 4px;
  --r-btn: 0px;
  --r-chip: 999px;

  /* Shadows */
  --sh-card: 0 2px 8px rgba(20, 8, 50, 0.06);
  --sh-card-hover: 0 4px 16px rgba(20, 8, 50, 0.10);

  /* Type scale (clamp-based) */
  --f-hero:  clamp(40px, 5.2vw, 72px);
  --f-big:   clamp(28px, 3.2vw, 44px);
  --f-mid:   clamp(20px, 2.2vw, 28px);
  --f-body:  15px;
  --f-small: 13px;
  --f-micro: 11px;

  /* Spacing */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  --s-7: 48px;
  --s-8: 64px;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink-900);
  font-family: 'Pretendard', 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  font-feature-settings: "tnum" 1, "ss01" 1;
  -webkit-font-smoothing: antialiased;
  font-size: var(--f-body);
  line-height: 1.45;
}
button { font-family: inherit; cursor: pointer; }
h1, h2, h3, h4 { margin: 0; font-weight: 700; letter-spacing: -0.01em; }
.mono { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; font-feature-settings: "tnum" 1; }
.tnum { font-variant-numeric: tabular-nums; }

/* card shell */
.card {
  background: var(--bg);
  border: 1px solid var(--ink-200);
  border-radius: var(--r-card);
  box-shadow: var(--sh-card);
  padding: var(--s-5);
}

/* chip / pill */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  font-size: var(--f-small);
  border: 1px solid var(--ink-200);
  background: var(--bg);
  color: var(--ink-700);
  border-radius: var(--r-chip);
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--ink-400); color: var(--ink-900); }
.chip.active {
  background: var(--p6-purple-500);
  color: #fff;
  border-color: var(--p6-purple-500);
}
.chip.all { font-weight: 600; }

/* step color helpers */
.step-1 { --step: var(--p6-purple-500); }
.step-2 { --step: var(--prog-work); }
.step-3 { --step: var(--prog-exec); }
.step-4 { --step: var(--prog-meet); }
.step-5 { --step: var(--prog-social); }
.step-6 { --step: var(--prog-support); }
</style>
<style>/* 공간DB — App-level layout & components */

/* ---------- Top Bar ---------- */
.topbar {
  position: sticky; top: 0; z-index: 40;
  background: rgba(255,255,255,0.92);
  backdrop-filter: saturate(180%) blur(8px);
  border-bottom: 1px solid var(--ink-200);
}
.topbar-inner {
  display: flex; align-items: center; gap: var(--s-5);
  padding: 14px 32px;
}
.brand {
  display: flex; align-items: baseline; gap: 8px;
  font-weight: 700; letter-spacing: -0.02em; font-size: 20px;
}
.brand .dot {
  width: 10px; height: 10px; background: var(--p6-purple-500);
  display: inline-block; transform: translateY(1px);
}
.brand .sub { color: var(--ink-500); font-weight: 500; font-size: 13px; margin-left: 4px; }
.tabs { display: flex; gap: 2px; margin-left: 16px; }
.tab {
  padding: 8px 14px; font-size: 13px; color: var(--ink-600);
  background: transparent; border: none; border-bottom: 2px solid transparent;
  cursor: pointer;
}
.tab.active { color: var(--ink-900); border-bottom-color: var(--p6-purple-500); font-weight: 600; }
.topbar-meta {
  margin-left: auto; display: flex; gap: 16px; align-items: center;
  color: var(--ink-500); font-size: 12px;
}
.topbar-meta .pill {
  padding: 4px 10px; background: var(--ink-100); color: var(--ink-700);
  border-radius: 999px; font-size: 12px; font-weight: 500;
}

/* ---------- Filter Bar (G탭) ---------- */
.filterbar {
  background: var(--bg-soft);
  border-bottom: 1px solid var(--ink-200);
  padding: 16px 32px 14px;
}
.filter-row {
  display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap;
}
.filter-group {
  display: flex; align-items: center; gap: 10px;
}
.filter-group-label {
  font-size: 12px; font-weight: 600; color: var(--ink-600);
  min-width: 72px; flex-shrink: 0;
}
.filter-chips {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.filter-expand {
  margin-top: 8px;
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--p6-purple-500); font-weight: 600;
  background: none; border: none; padding: 0; cursor: pointer;
}
.filter-summary {
  display: flex; align-items: center; gap: 12px;
  margin-top: 12px; padding-top: 12px;
  border-top: 1px dashed var(--ink-200);
  font-size: 13px; color: var(--ink-700);
}
.filter-summary .count {
  font-weight: 700; color: var(--p6-purple-500); font-size: 18px;
  font-variant-numeric: tabular-nums;
}
.filter-summary .warn {
  margin-left: auto; padding: 6px 12px; background: #fff4e5;
  color: #a35a00; font-size: 12px; border-radius: 4px;
}

/* ---------- Step Navigator ---------- */
.stepnav {
  display: flex; align-items: stretch; gap: 0;
  padding: 12px 32px;
  overflow-x: auto;
  background: var(--bg);
  border-bottom: 1px solid var(--ink-200);
  position: sticky; top: 54px; z-index: 30;
}
.stepnav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 18px 8px 0;
  background: none; border: none;
  color: var(--ink-500); cursor: pointer;
  white-space: nowrap;
  font-size: 14px;
  border-right: 1px solid var(--ink-200);
  padding-right: 24px;
  margin-right: 4px;
}
.stepnav-item:last-child { border-right: none; }
.stepnav-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
  color: var(--ink-400);
  padding: 3px 7px; background: var(--ink-100);
  border-radius: 2px;
}
.stepnav-item.active .stepnav-num { color: #fff; background: var(--step, var(--p6-purple-500)); }
.stepnav-item.active { color: var(--ink-900); font-weight: 700; }
.stepnav-item.active .stepnav-label { color: var(--step, var(--p6-purple-500)); }

/* ---------- Step Section ---------- */
.step-section {
  padding: 56px 32px;
  border-bottom: 1px solid var(--ink-100);
  scroll-margin-top: 110px;
}
.step-section:nth-child(even) { background: var(--bg-soft); }

.step-hero {
  display: grid;
  grid-template-columns: minmax(280px, 420px) 1fr;
  gap: 48px;
  margin-bottom: 40px;
  align-items: end;
}
.step-hero-left .step-tag {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 700;
  color: var(--step, var(--p6-purple-500));
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}
.step-hero-left .step-tag::before {
  content: ''; width: 28px; height: 2px; background: currentColor;
}
.step-hero-left h2 {
  font-size: clamp(32px, 4vw, 48px);
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--ink-900);
}
.step-hero-left h2 .accent { color: var(--step, var(--p6-purple-500)); }

.step-hero-right {
  font-size: clamp(16px, 1.4vw, 18px);
  color: var(--ink-600);
  line-height: 1.55;
  padding-bottom: 6px;
  max-width: 520px;
}
.step-hero-right .q {
  font-size: clamp(18px, 1.6vw, 22px);
  color: var(--ink-900);
  font-weight: 600;
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

/* ---------- Grid helpers ---------- */
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-6 { grid-template-columns: repeat(6, 1fr); }
.grid-3-fr { grid-template-columns: 1.4fr 1fr 1fr; }

/* ---------- Cards (shared shell) ---------- */
.c {
  background: var(--bg);
  border: 1px solid var(--ink-200);
  border-radius: var(--r-card);
  box-shadow: var(--sh-card);
  padding: 20px 22px;
  display: flex; flex-direction: column; gap: 12px;
  min-height: 180px;
}
.c-title {
  font-size: 13px; font-weight: 600; color: var(--ink-700);
  letter-spacing: -0.005em;
  display: flex; align-items: center; gap: 8px;
}
.c-title .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700;
  padding: 2px 6px; background: var(--ink-100); color: var(--ink-500);
  border-radius: 2px; letter-spacing: 0.04em;
}
.c-sub { font-size: 12px; color: var(--ink-500); margin-top: -4px; }
.c-footer { margin-top: auto; font-size: 12px; color: var(--ink-500); }

/* 범위형 카드 */
.rangecard-main {
  display: flex; align-items: baseline; gap: 8px;
  justify-content: center;
  padding: 8px 0;
}
.rangecard-main .val {
  font-size: clamp(40px, 5vw, 62px);
  font-weight: 800; letter-spacing: -0.03em;
  color: var(--step, var(--p6-purple-500));
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.rangecard-main .unit {
  font-size: 14px; color: var(--ink-500); font-weight: 500;
}
.rangecard-range {
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  gap: 10px; color: var(--ink-500); font-size: 13px;
  text-align: center;
  padding-top: 8px;
  border-top: 1px dashed var(--ink-200);
}
.rangecard-range .minmax { font-variant-numeric: tabular-nums; }
.rangecard-range .minmax .n { color: var(--ink-700); font-weight: 600; font-size: 16px; }
.rangecard-range .dash { color: var(--ink-300); font-weight: 400; }

/* 강조 %형 카드 */
.pctcard {
  display: flex; flex-direction: column; gap: 4px; flex: 1; justify-content: center;
}
.pctcard .label { font-size: 11px; color: var(--ink-500); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
.pctcard .val {
  font-size: clamp(44px, 5.4vw, 68px);
  font-weight: 800; letter-spacing: -0.03em; line-height: 1;
  color: var(--step, var(--p6-purple-500));
  font-variant-numeric: tabular-nums;
}
.pctcard .val .u { font-size: 0.4em; font-weight: 600; color: var(--ink-500); margin-left: 4px; }
.pctcard .desc { font-size: 13px; color: var(--ink-600); margin-top: 8px; }

/* 단순 값형 */
.valcard .val {
  font-size: clamp(36px, 4.4vw, 54px);
  font-weight: 800; letter-spacing: -0.03em; line-height: 1;
  color: var(--ink-900);
  font-variant-numeric: tabular-nums;
}
.valcard .val .u { font-size: 0.36em; color: var(--ink-500); margin-left: 4px; }

/* 리스트형 카드 */
.listcard ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.listcard li {
  display: grid; grid-template-columns: 1fr auto; align-items: baseline;
  gap: 12px; padding-bottom: 8px;
  border-bottom: 1px dotted var(--ink-200);
}
.listcard li:last-child { border-bottom: none; padding-bottom: 0; }
.listcard .lc-label { font-size: 14px; color: var(--ink-800); }
.listcard .lc-val {
  font-size: 18px; font-weight: 700; color: var(--ink-900);
  font-variant-numeric: tabular-nums;
}
.listcard .lc-val .u { font-size: 11px; color: var(--ink-500); font-weight: 500; margin-left: 2px; }

/* horizontal bar */
.hbar { height: 6px; background: var(--ink-100); position: relative; overflow: hidden; border-radius: 2px; margin-top: 4px; }
.hbar > span { position: absolute; inset: 0 auto 0 0; background: var(--step, var(--p6-purple-500)); }

/* ---------- Floor Plan visual (STEP 1) ---------- */
.floorplan {
  display: grid;
  grid-template-columns: repeat(100, 1fr);
  grid-auto-rows: 14px;
  gap: 0;
  padding: 8px;
  background: #f8f4fe;
  border: 1px solid var(--ink-200);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.fp-zone {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 11px; font-weight: 600;
  overflow: hidden;
  padding: 4px 8px;
  letter-spacing: -0.01em;
}
.fp-zone .pct {
  position: absolute; top: 6px; right: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; opacity: 0.9;
}
.fp-legend {
  display: flex; flex-wrap: wrap; gap: 14px 18px;
  margin-top: 14px;
  font-size: 12px; color: var(--ink-700);
}
.fp-legend .sw {
  display: inline-flex; align-items: center; gap: 6px;
}
.fp-legend .sw::before {
  content: ''; width: 10px; height: 10px; background: currentColor; display: inline-block;
}

/* ---------- Dumbbell (min-med-max visual) ---------- */
.dumbbell {
  position: relative; height: 40px; margin: 6px 0 4px;
}
.dumbbell .line {
  position: absolute; left: 0; right: 0; top: 50%;
  height: 2px; background: var(--ink-200); transform: translateY(-50%);
}
.dumbbell .seg {
  position: absolute; top: 50%; height: 4px;
  background: var(--step, var(--p6-purple-500));
  transform: translateY(-50%); opacity: 0.25;
}
.dumbbell .dot {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 10px; height: 10px; border-radius: 999px;
  background: var(--ink-400); border: 2px solid #fff;
  box-shadow: 0 0 0 1px var(--ink-300);
}
.dumbbell .dot.med {
  width: 16px; height: 16px; background: var(--step, var(--p6-purple-500));
  box-shadow: 0 0 0 3px #fff, 0 0 0 4px var(--step, var(--p6-purple-500));
  z-index: 2;
}
.dumbbell .tick {
  position: absolute; top: 100%; margin-top: 2px;
  transform: translateX(-50%);
  font-size: 11px; color: var(--ink-500);
  font-variant-numeric: tabular-nums;
}
.dumbbell .tick.med { font-size: 14px; color: var(--ink-900); font-weight: 700; }

/* ---------- Stacked 100 bar (program mix) ---------- */
.stack100 {
  display: flex; width: 100%; height: 48px;
  border-radius: 4px; overflow: hidden;
  border: 1px solid var(--ink-200);
}
.stack100 .seg {
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 700;
  position: relative;
}

/* ---------- Donut ---------- */
.donut-wrap { display: flex; align-items: center; gap: 18px; }
.donut { width: 120px; height: 120px; flex-shrink: 0; }
.donut .c-center {
  font-size: 22px; font-weight: 800; fill: var(--ink-900);
  font-variant-numeric: tabular-nums;
}

/* ---------- Meeting room iso grid ---------- */
.meet-sizes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.meet-box {
  border: 1px solid var(--ink-200);
  border-radius: 4px;
  padding: 12px;
  position: relative;
  aspect-ratio: 1.4 / 1;
  background: var(--bg);
  display: flex; flex-direction: column; justify-content: flex-end;
}
.meet-box .glyph {
  position: absolute; inset: 12px; display: grid;
  place-items: center;
  opacity: 0.08;
}
.meet-box .size-label {
  font-size: 12px; font-weight: 600; color: var(--ink-600);
  position: relative; z-index: 1;
}
.meet-box .size-val {
  font-size: 28px; font-weight: 800; color: var(--step);
  font-variant-numeric: tabular-nums;
  position: relative; z-index: 1; line-height: 1;
}
.meet-box .size-val .u { font-size: 12px; font-weight: 500; color: var(--ink-500); margin-left: 2px; }
.meet-box .size-meta {
  font-size: 11px; color: var(--ink-500); position: relative; z-index: 1; margin-top: 4px;
}

/* ---------- Question/Answer strip ---------- */
.qa {
  display: grid; grid-template-columns: auto 1fr;
  gap: 14px 20px; align-items: baseline;
  padding: 18px 22px;
  background: var(--bg);
  border: 1px solid var(--ink-200);
  border-left: 3px solid var(--step, var(--p6-purple-500));
  border-radius: 4px;
  margin-bottom: 16px;
}
.qa .q-mark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 700;
  color: var(--step, var(--p6-purple-500));
  letter-spacing: 0.05em;
}
.qa .q-text { font-size: 15px; color: var(--ink-700); font-weight: 500; }
.qa .a-mark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 700;
  color: var(--ink-500); letter-spacing: 0.05em;
}
.qa .a-text {
  font-size: 18px; color: var(--ink-900); font-weight: 700;
  letter-spacing: -0.01em;
}
.qa .a-text .accent { color: var(--step, var(--p6-purple-500)); }

/* ---------- Person matrix (인원 시각화) ---------- */
.person-matrix {
  display: flex; flex-wrap: wrap; gap: 3px;
  padding: 12px 0;
}
.person-matrix .p {
  width: 10px; height: 14px; background: var(--ink-300);
  clip-path: polygon(50% 0, 65% 30%, 100% 45%, 100% 100%, 0 100%, 0 45%, 35% 30%);
}
.person-matrix .p.on { background: var(--step, var(--p6-purple-500)); }

/* ---------- Bar chart (연도별) ---------- */
.ybar-row {
  display: grid; grid-template-columns: 60px 1fr auto;
  align-items: center; gap: 14px;
  padding: 6px 0;
}
.ybar-row .y { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-500); }
.ybar-row .track { height: 22px; background: var(--ink-100); position: relative; border-radius: 2px; overflow: hidden; }
.ybar-row .fill { position: absolute; inset: 0 auto 0 0; background: var(--step, var(--p6-purple-500)); }
.ybar-row .v { font-size: 13px; font-weight: 700; color: var(--ink-800); font-variant-numeric: tabular-nums; }

/* ---------- Responsive ---------- */
@media (max-width: 1100px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
  .grid-6 { grid-template-columns: repeat(3, 1fr); }
  .grid-3-fr { grid-template-columns: 1fr 1fr; }
  .step-hero { grid-template-columns: 1fr; gap: 16px; }
  .meet-sizes { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 680px) {
  .topbar-inner { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
  .tabs { order: 3; width: 100%; overflow-x: auto; }
  .topbar-meta { display: none; }
  .filterbar { padding: 12px 16px; }
  .filter-group-label { min-width: 60px; font-size: 11px; }
  .stepnav { padding: 10px 16px; top: 96px; }
  .step-section { padding: 40px 16px; }
  .grid-2, .grid-3, .grid-4, .grid-6 { grid-template-columns: 1fr; }
  .meet-sizes { grid-template-columns: repeat(2, 1fr); }
  .rangecard-main .val { font-size: 44px; }
}
</style>
</head>

<div id="root"></div>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>
<script type="text/babel">/* global React */
// 공간DB — Shared atoms

const { useMemo, useState, useEffect, useRef } = React;

// ---------- Utilities ----------
const fmt = {

// ---------- Step Hero ----------

// ---------- Range Card (범위형) ----------

function Dumbbell({ min, med, max, unit='', digits=0 }) {

// ---------- Pct Card (강조 %형) ----------
function PctCard({ title, tag, value, desc, footer, accent }) {

        {desc && <div className="desc">{desc}</div>}

      {footer && <div className="c-footer">{footer}</div>}

// ---------- Value Card (단순 값형) ----------
function ValCard({ title, tag, value, unit, desc, footer }) {
  return (
    <div className="c valcard">
      <div className="c-title">{tag && <span className="tag">{tag}</span>}{title}</div>

        <div className="val tnum">{value}{unit && <span className="u">{unit}</span>}</div>
        {desc && <div className="desc">{desc}</div>}
      </div>
      {footer && <div className="c-footer">{footer}</div>}

}

// ---------- List Card (리스트형) ----------
function ListCard({ title, tag, items, footer, subLabel, unit }) {
  const max = Math.max(...items.map(i => i.pct ?? i.count ?? i.area ?? 0));
  return (
    <div className="c listcard">
      <div className="c-title">{tag && <span className="tag">{tag}</span>}{title}</div>
      {subLabel && <div className="c-sub">{subLabel}</div>}

        {items.map((it, i) => {

          return (

// ---------- Description Card (설명형) ----------
function DescCard({ title, tag, value, unit, lines, footer }) {

// ---------- Stacked 100 bar ----------
const PROG_COLORS = {
  work:    'var(--prog-work)',
  exec:    'var(--prog-exec)',
  meet:    'var(--prog-meet)',
  social:  'var(--prog-social)',
  support: 'var(--prog-support)',

};
function Stack100({ data, keyMap }) {

          {d.pct >= 6 ? `${d.pct}%` : ''}

}

// ---------- Donut ----------
function Donut({ value, color='var(--p6-purple-500)', label, size=120 }) {

  return (

// Expose
Object.assign(window, {

<script type="text/babel">/* global React, StepHero, QA, RangeCard, PctCard, ValCard, ListCard, DescCard, Stack100, Donut, PersonMatrix, YearBars, PROG_COLORS, fmt */

// ---------- FLOORPLAN VISUAL ----------
// Treemap-ish floorplan where each program takes area proportional to pct.
function FloorPlan({ mix, unit='m²', totalArea = 1180 }) {
  // Layout: split work + meet on top row; exec + social + support + circ on bottom row, heights proportional.
  // Use CSS grid with span units.
  const GRID_W = 100, GRID_H = 56;
  // Split vertically into 2 rows: top = work+meet+exec (≈64%), bottom = social+support+circ (≈36%)
  const topKeys = ['work', 'meet', 'exec'];
  const botKeys = ['social', 'support', 'circ'];
  const topMix = mix.filter(m => topKeys.includes(m.key));
  const botMix = mix.filter(m => botKeys.includes(m.key));
  const topPct = topMix.reduce((s, m) => s + m.pct, 0);
  const botPct = botMix.reduce((s, m) => s + m.pct, 0);

  // Heights in grid rows (proportional to topPct/totalPct)
  const total = topPct + botPct;
  const topRows = Math.round((topPct/total) * GRID_H);
  const botRows = GRID_H - topRows;

  const colors = PROG_COLORS;

  return (
    <div>
      <div className="floorplan" style={{ gridAutoRows: 'unset', gridTemplateRows: `${topRows}fr ${botRows}fr`, minHeight: 380 }}>
        {/* Top row */}
        <div style={{ gridRow: '1', gridColumn: '1 / -1', display: 'grid',
                      gridTemplateColumns: topMix.map(m => `${m.pct}fr`).join(' '), gap: 4, padding: 4 }}>
          {topMix.map(m => (
            <div key={m.key} className="fp-zone" style={{
              background: colors[m.key],
              minHeight: 60,
            }}>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '-0.01em' }}>{m.label}</div>
                <div style={{ fontSize: 20, fontWeight: 800, marginTop: 4 }}>{m.pct}<span style={{fontSize:11,opacity:0.85,marginLeft:2}}>%</span></div>
              </div>
              <div className="pct" style={{fontFamily:'JetBrains Mono, monospace', fontSize: 10}}>
                {Math.round(totalArea * m.pct / 100)}㎡
              </div>
            </div>
          ))}
        </div>
        {/* Bottom row */}
        <div style={{ gridRow: '2', gridColumn: '1 / -1', display: 'grid',
                      gridTemplateColumns: botMix.map(m => `${m.pct}fr`).join(' '), gap: 4, padding: 4 }}>
          {botMix.map(m => (
            <div key={m.key} className="fp-zone" style={{
              background: colors[m.key],
              color: m.key === 'circ' ? 'var(--ink-800)' : '#fff',
              minHeight: 50,
            }}>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 12, fontWeight: 700 }}>{m.label}</div>
                <div style={{ fontSize: 18, fontWeight: 800, marginTop: 2 }}>{m.pct}<span style={{fontSize:10,opacity:0.85,marginLeft:2}}>%</span></div>
              </div>
              <div className="pct" style={{fontFamily:'JetBrains Mono, monospace', fontSize: 10, color: m.key === 'circ' ? 'var(--ink-600)' : '#fff'}}>
                {Math.round(totalArea * m.pct / 100)}㎡
              </div>
            </div>
          ))}
        </div>
      </div>
      <div className="fp-legend">
        {mix.map(m => (
          <span key={m.key} className="sw" style={{ color: colors[m.key] }}>
            <span/><span style={{color: 'var(--ink-700)'}}>{m.label} <span className="tnum" style={{color: 'var(--ink-500)'}}>· {m.pct}%</span></span>
          </span>
        ))}
      </div>
    </div>
  );
}

// ---------- STEP 1: 전체 조닝 ----------
function Step1({ data, unit }) {
  const D = data.zoning;
  const mix = data.programMix;
  const area = D.areaPerFloor;
  return (
    <section id="step-1" className="step-section step-1">
      <StepHero num={1} title="전체 조닝" />
      <div className="step-hero" style={{marginTop:-24}}>
        <div className="step-hero-left" style={{visibility:'hidden', height:0}}/>
        <div className="step-hero-right">
          <div className="q">"1개층, 몇 명을 위한 얼마의 공간인가?"</div>
          <div>이 프로젝트 조건에서 실무 데이터는 이렇게 모여 있어요.</div>
        </div>

      <div className="grid grid-3" style={{marginBottom: 24}}>
        <RangeCard tag="범위형" title="1개층 적정 인원" unit="인"
          min={D.headcountPerFloor.min} med={D.headcountPerFloor.med} max={D.headcountPerFloor.max}

        <RangeCard tag="범위형" title="1개층 가용 면적" unit={unit === 'py' ? '평' : '㎡'}
          min={unit==='py'? Math.round(fmt.m2p(area.min)) : area.min}

        />
        <RangeCard tag="범위형" title="인당 면적 (전체)" unit={unit === 'py' ? '평/인' : '㎡/인'}
          digits={1}
          min={unit==='py'? fmt.m2p(D.areaPerPerson.min) : D.areaPerPerson.min}
          med={unit==='py'? fmt.m2p(D.areaPerPerson.med) : D.areaPerPerson.med}
          max={unit==='py'? fmt.m2p(D.areaPerPerson.max) : D.areaPerPerson.max}
          footer="가용면적 ÷ 인원 · 도면 평균"
        />
      </div>

      <div className="c" style={{padding: 24}}>
        <div className="c-title" style={{marginBottom: 4}}>
          <span className="tag">비유형</span>
          공간 프로그램 비중 — 1개층을 이렇게 나눕니다
        </div>
        <div className="c-sub" style={{marginBottom: 16}}>
          전체 도면의 프로그램별 평균 면적 비율을 평면도 형태로 표현. 숫자 대신 눈으로 읽어보세요.
        </div>
        <FloorPlan mix={mix} totalArea={D.areaPerFloor.med}/>
      </div>
    </section>
  );
}

// ---------- STEP 2: 업무공간 ----------
function Step2({ data, unit }) {
  const W = data.work;
  return (
    <section id="step-2" className="step-section step-2">
      <StepHero num={2} title="업무공간"/>
      <QA question="100명이면 업무공간은 몇 ㎡?" answer={
        <span>인당 <span className="accent tnum">{unit==='py'? fmt.n(fmt.m2p(W.areaPerPerson),2) : W.areaPerPerson}</span> {unit==='py'? '평' : '㎡'} × 100인 = <span className="accent tnum">
          {unit==='py'? fmt.n(fmt.m2p(W.areaPerPerson) * 100, 0) : fmt.n(W.areaPerPerson * 100, 0)}
        </span> {unit==='py'? '평' : '㎡'}</span>
      }/>

      <div className="grid grid-4" style={{marginBottom: 16}}>
        <PctCard tag="%형" title="업무공간 비중" value={W.share} desc="가용면적 대비 평균"/>
        <ValCard tag="값형" title="인당 면적 (업무)" value={unit==='py'? fmt.n(fmt.m2p(W.areaPerPerson),2) : W.areaPerPerson} unit={unit==='py'? '평/인' : '㎡/인'} desc="업무공간 한정"/>
        <PctCard tag="%형" title="자율좌석제 시행" value={42} desc="전체 도면 중"/>
        <PctCard tag="%형" title="그룹업무공간 보유" value={W.groupWorkRoom} desc="전체 도면 중"/>
      </div>

      <div className="grid grid-3" style={{marginBottom: 16}}>
        <ListCard tag="리스트형" title="주요 데스크 형태" items={W.deskShapes}/>
        <ListCard tag="리스트형" title="주요 데스크 너비" items={W.deskWidths}/>
        <ListCard tag="리스트형" title="팀장석 구성 유형" items={W.teamLead}/>
      </div>

      <div className="grid grid-3">
        <DescCard tag="설명형" title="권장 주통로 너비" value={W.corridor.main.med} unit="mm"
          lines={[`범위 ${W.corridor.main.min} ~ ${W.corridor.main.max}mm`, '주 이동 동선, 카트·응대 동선 겸용']}

<script type="text/babel">/* global React, ReactDOM, Step1, Step2, Step3, Step4, Step5, Step6, TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakToggle, TweakSelect */

const { useState, useEffect, useMemo, useRef } = React;

const STEPS = [
  { id: 1, label: '전체 조닝', color: 'var(--p6-purple-500)' },
  { id: 2, label: '업무',     color: 'var(--prog-work)' },
  { id: 3, label: '임원',     color: 'var(--prog-exec)' },
  { id: 4, label: '회의',     color: 'var(--prog-meet)' },
  { id: 5, label: '소셜',     color: 'var(--prog-social)' },
  { id: 6, label: '지원',     color: 'var(--prog-support)' },
];

function TopBar() {
  return (
    <div className="topbar">
      <div className="topbar-inner">
        <div className="brand">
          <span className="dot"/> 공간DB
          <span className="sub">v2.8 · 퍼플식스 디자인 시스템</span>
        </div>
        <div className="tabs">
          <button className="tab active">G · 설계 가이드</button>
          <button className="tab">개괄</button>
          <button className="tab">업무</button>
          <button className="tab">임원</button>
          <button className="tab">회의</button>
          <button className="tab">소셜</button>
          <button className="tab">지원</button>
        </div>
        <div className="topbar-meta">
          <span className="pill">540건 · 2002–2025</span>
          <span>퍼시스·퍼플식스 스튜디오</span>
        </div>
      </div>
    </div>
  );
}

function FilterChips({ label, options, selected, onChange }) {
  return (
    <div className="filter-group">
      <div className="filter-group-label">{label}</div>
      <div className="filter-chips">
        {options.map(o => {
          const isAll = o === '전체';
          const isActive = isAll ? selected.length === 0 : selected.includes(o);
          return (
            <button key={o}
              className={`chip ${isActive ? 'active' : ''} ${isAll ? 'all' : ''}`}
              onClick={() => {
                if (isAll) { onChange([]); return; }
                const next = selected.includes(o)
                  ? selected.filter(x => x !== o)
                  : [...selected, o];
                onChange(next);
              }}
            >{o}</button>
          );
        })}
      </div>
    </div>
  );
}

function FilterBar({ filters, sel, setSel, matched, showExtra, setShowExtra }) {
  return (
    <div className="filterbar">
      <div className="filter-row">
        <FilterChips label="가용면적" options={filters.area} selected={sel.area} onChange={v=>setSel({...sel, area:v})}/>
        <FilterChips label="인원" options={filters.headcount} selected={sel.headcount} onChange={v=>setSel({...sel, headcount:v})}/>
        <FilterChips label="업종" options={filters.industry} selected={sel.industry} onChange={v=>setSel({...sel, industry:v})}/>
      </div>
      <button className="filter-expand" onClick={()=>setShowExtra(!showExtra)}>
        {showExtra ? '− 추가 필터 접기' : '+ 추가 필터 펼치기 (권역·연도·프라임·기업유형)'}
      </button>
      {showExtra && (
        <div className="filter-row" style={{marginTop:12}}>
          <FilterChips label="권역" options={filters.region} selected={sel.region} onChange={v=>setSel({...sel, region:v})}/>
          <FilterChips label="연도" options={filters.year} selected={sel.year} onChange={v=>setSel({...sel, year:v})}/>
          <FilterChips label="프라임" options={filters.primeOffice} selected={sel.primeOffice} onChange={v=>setSel({...sel, primeOffice:v})}/>
          <FilterChips label="기업유형" options={filters.corpType} selected={sel.corpType} onChange={v=>setSel({...sel, corpType:v})}/>
        </div>
      )}
      <div className="filter-summary">
        <div>적용된 도면 <span className="count">{matched}</span>건 / 전체 540건</div>
        <div style={{color:'var(--ink-500)',fontSize:12}}>동일 필드 다중선택 OR · 필드 간 AND</div>
        {matched < 30 && <div className="warn">⚠ 30건 미만 · 지표 신뢰도 낮음</div>}
      </div>
    </div>
  );
}

function StepNav({ active, onJump }) {
  return (
    <div className="stepnav">
      {STEPS.map(s => (
        <button key={s.id}
          className={`stepnav-item step-${s.id} ${active === s.id ? 'active' : ''}`}
          onClick={() => onJump(s.id)}
        >
          <span className="stepnav-num">{String(s.id).padStart(2,'0')}</span>
          <span className="stepnav-label">{s.label}</span>
        </button>
      ))}
    </div>
  );
}

function App() {
  const data = window.SPACE_DB;

  const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "unit": "m2",
    "variation_step1": "floorplan",
    "showStep1": true,
    "showStep2": true,
    "showStep3": true,
    "showStep4": true,
    "showStep5": true,
    "showStep6": true
  }/*EDITMODE-END*/);

  const [sel, setSel] = useState({
    area: [], headcount: [], industry: [],
    region: [], year: [], primeOffice: [], corpType: [],
  });
  const [showExtra, setShowExtra] = useState(false);
  const [active, setActive] = useState(1);

  // "matched count" mock: base 540 scaled by active filter breadth
  const matched = useMemo(() => {
    const totalFilters = Object.values(sel).reduce((s, arr) => s + arr.length, 0);
    if (totalFilters === 0) return 540;
    const factor = Math.max(0.12, Math.pow(0.68, totalFilters));
    return Math.max(18, Math.round(540 * factor));
  }, [sel]);

  // Scroll spy
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const id = parseInt(e.target.id.replace('step-', ''), 10);
          if (!isNaN(id)) setActive(id);
        }
      });
    }, { rootMargin: '-40% 0px -50% 0px', threshold: 0 });
    STEPS.forEach(s => {
      const el = document.getElementById(`step-${s.id}`);
      if (el) obs.observe(el);
    });
    return () => obs.disconnect();
  }, []);

  const jump = (id) => {
    const el = document.getElementById(`step-${id}`);
    if (el) {
      const y = el.getBoundingClientRect().top + window.scrollY - 100;
      window.scrollTo({ top: y, behavior: 'smooth' });
    }
  };

  const unit = tweaks.unit;

  return (
    <div>
      <TopBar/>
      <FilterBar filters={data.filters} sel={sel} setSel={setSel} matched={matched}
        showExtra={showExtra} setShowExtra={setShowExtra}/>
      <StepNav active={active} onJump={jump}/>

      {/* Inline unit toggle */}
      <div style={{display:'flex', justifyContent:'flex-end', padding:'12px 32px 0', gap:8, alignItems:'center'}}>
        <span style={{fontSize:12, color:'var(--ink-500)'}}>단위</span>
        <div style={{display:'inline-flex', border:'1px solid var(--ink-200)', borderRadius:2, overflow:'hidden'}}>
          <button onClick={()=>setTweak({unit:'m2'})}
            style={{padding:'6px 14px', fontSize:12, fontWeight:600, background: unit==='m2'?'var(--ink-900)':'var(--bg)', color: unit==='m2'?'#fff':'var(--ink-600)', border:'none', cursor:'pointer'}}>㎡</button>
          <button onClick={()=>setTweak({unit:'py'})}
            style={{padding:'6px 14px', fontSize:12, fontWeight:600, background: unit==='py'?'var(--ink-900)':'var(--bg)', color: unit==='py'?'#fff':'var(--ink-600)', border:'none', cursor:'pointer'}}>평</button>
        </div>
      </div>

      {tweaks.showStep1 && <Step1 data={data} unit={unit} variation={tweaks.variation_step1}/>}
      {tweaks.showStep2 && <Step2 data={data} unit={unit}/>}
      {tweaks.showStep3 && <Step3 data={data} unit={unit}/>}
      {tweaks.showStep4 && <Step4 data={data} unit={unit}/>}
      {tweaks.showStep5 && <Step5 data={data} unit={unit}/>}
      {tweaks.showStep6 && <Step6 data={data} unit={unit}/>}

      <footer style={{padding:'32px', background:'var(--ink-900)', color:'var(--ink-400)', fontSize:12}}>
        <div style={{display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:16}}>
          <div>
            <div style={{color:'#fff', fontSize:14, fontWeight:700, marginBottom:4}}>공간DB v2.8</div>
            <div>퍼시스·퍼플식스 스튜디오 · 2002–2025 오피스 도면 540건</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div>Tableau와 동일 계산 원칙 · 매년 1회 업데이트</div>
            <div style={{marginTop:4, fontSize:11}}>사내 자료 · 외부 공유 시 출처 표기 필요</div>
          </div>
        </div>
      </footer>

      <TweaksPanel title="Tweaks — 공간DB">
        <TweakSection title="표시 스텝">
          <TweakToggle label="STEP 1 전체 조닝" value={tweaks.showStep1} onChange={v=>setTweak({showStep1:v})}/>
          <TweakToggle label="STEP 2 업무" value={tweaks.showStep2} onChange={v=>setTweak({showStep2:v})}/>
          <TweakToggle label="STEP 3 임원" value={tweaks.showStep3} onChange={v=>setTweak({showStep3:v})}/>
          <TweakToggle label="STEP 4 회의" value={tweaks.showStep4} onChange={v=>setTweak({showStep4:v})}/>
          <TweakToggle label="STEP 5 소셜" value={tweaks.showStep5} onChange={v=>setTweak({showStep5:v})}/>
          <TweakToggle label="STEP 6 지원" value={tweaks.showStep6} onChange={v=>setTweak({showStep6:v})}/>
        </TweakSection>
        <TweakSection title="단위">
          <TweakRadio value={tweaks.unit} onChange={v=>setTweak({unit:v})}
            options={[{label:'㎡ (제곱미터)', value:'m2'},{label:'평', value:'py'}]}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
