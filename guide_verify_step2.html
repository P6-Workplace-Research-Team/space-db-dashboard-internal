<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guide Step 2 Verify</title>
  <style>
    html, body { margin: 0; height: 100%; background: #ffffff; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <iframe id="verify-frame" src="./spacedatabase_dashboard.html"></iframe>
  <script>
    const frame = document.getElementById('verify-frame');
    frame.addEventListener('load', () => {
      const w = frame.contentWindow;
      const sync = () => {
        try {
          w.activeSec = 'G';
          w.guideShowAll = false;
          if (typeof w.renderGuideTab === 'function') w.renderGuideTab();
          const buttons = Array.from(w.document.querySelectorAll('.guide-step-btn'));
          const workBtn = buttons.find(btn => btn.textContent.includes('업무')) || buttons[1];
          workBtn?.click();
          if (typeof w.jumpGuideStep === 'function') w.jumpGuideStep(2);
          if (typeof w.syncSectionChrome === 'function') w.syncSectionChrome();
          if (typeof w.scheduleGuideViewportFit === 'function') w.scheduleGuideViewportFit();
          w.document.getElementById('sec-G')?.scrollIntoView({ block: 'start' });
        } catch (e) {
          console.error(e);
        }
      };
      sync();
      setTimeout(sync, 300);
      setTimeout(sync, 900);
      setTimeout(sync, 1800);
    });
  </script>
</body>
</html>
