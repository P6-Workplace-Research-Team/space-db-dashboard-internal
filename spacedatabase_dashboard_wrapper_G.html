<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Guide Tab Wrapper</title>
<style>
html,body,iframe{margin:0;padding:0;width:100%;height:100%;border:0;background:#fff}
</style>
</head>
<body>
<iframe id="app" src="file:///C:/Users/HP/Documents/Claude/Projects/spacedatabase%20dashboard/spacedatabase_dashboard.html"></iframe>
<script>
const frame = document.getElementById('app');
frame.addEventListener('load', () => {
  const win = frame.contentWindow;
  const doc = frame.contentDocument;
  const btn = doc.querySelectorAll('.nv')[6];
  if (win && typeof win.showSec === 'function' && btn) {
    win.showSec('G', btn);
    win.scrollTo(0, 0);
  }
});
</script>
</body>
</html>
